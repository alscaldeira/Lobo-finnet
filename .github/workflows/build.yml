name: Build Python Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with: 
          python-version: '3.x'
          
      - name: Install dependencies and Playwright Browsers locally
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller playwright pytest-playwright
          # Configura o Playwright para baixar os navegadores na pasta local do projeto
          export PLAYWRIGHT_BROWSERS_PATH=0
          playwright install chromium

      - name: Build Executable with PyInstaller
        run: |
          # O comando abaixo varia dependendo do Sistema Operacional. 
          # Para simplificar cross-platform, o ideal é usar uma variável de ambiente no código Python para ler o PATH, 
          # ou ajustar o comando pyinstaller usando a flag --add-data adequada para cada OS.
          pyinstaller --onefile --env PLAYWRIGHT_BROWSERS_PATH=0 seu_script.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-executable
          # PyInstaller appends extensions based on OS (.exe on Windows, no extension on Linux/Mac)
          # Using a wildcard covers all of them automatically
          path: dist/finnet*
