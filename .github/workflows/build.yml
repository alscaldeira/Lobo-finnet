name: Build Python Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright-browsers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies and Playwright browsers
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller playwright
          playwright install chromium
          # Compacta a pasta dos navegadores em um arquivo .zip
          cd "$PLAYWRIGHT_BROWSERS_PATH/.."
          zip -r playwright-browsers.zip playwright-browsers
          ls -la  # Para verificar se o zip foi criado

      - name: Build Executable with PyInstaller
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          # Inclui o .zip como dado (e não a pasta diretamente)
          pyinstaller --onefile --copy-metadata playwright --add-data "playwright-browsers.zip${SEP}playwright-browsers.zip" finnet.py
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-executable
          path: dist/finnet*