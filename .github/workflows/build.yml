name: Build Python Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with: 
          python-version: '3.x'
          
      - name: Install dependencies and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller playwright pytest-playwright
          playwright install --with-deps

      # --- THIS WAS THE MISSING STEP ---
      - name: Build Executable with PyInstaller
        run: pyinstaller --onefile finnet.py  # Replace finnet.py with your actual script name

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-executable
          # PyInstaller appends extensions based on OS (.exe on Windows, no extension on Linux/Mac)
          # Using a wildcard covers all of them automatically
          path: dist/finnet*
