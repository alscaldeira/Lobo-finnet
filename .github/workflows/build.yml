name: Build Python Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright-browsers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies and Playwright browsers
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller playwright
          playwright install chromium

      - name: Compress Playwright browsers into zip
        shell: bash
        run: |
          # Entra no diretório onde está a pasta playwright-browsers
          cd "$PLAYWRIGHT_BROWSERS_PATH/.."
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            # No Windows, usa PowerShell para compactar
            powershell -Command "Compress-Archive -Path playwright-browsers -DestinationPath playwright-browsers.zip -Force"
          else
            # Linux/macOS: usa zip nativo
            zip -r playwright-browsers.zip playwright-browsers
          fi
          # Verifica se o zip foi criado
          ls -la playwright-browsers.zip

      - name: Build Executable with PyInstaller
        shell: bash
        run: |
          # Define separador para --add-data
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            SEP=";"
          else
            SEP=":"
          fi
          # Caminho relativo: o zip está na raiz do projeto (mesmo diretório do finnet.py)
          pyinstaller --onefile --copy-metadata playwright --add-data "playwright-browsers.zip${SEP}playwright-browsers.zip" finnet.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-executable
          path: dist/finnet*