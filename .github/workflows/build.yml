name: Build Python Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright-browsers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies and Playwright browsers
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller playwright
          playwright install chromium

      - name: Compress Playwright browsers into browsers.zip
        shell: bash
        run: |
          cd "$PLAYWRIGHT_BROWSERS_PATH/.."
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            powershell -Command "Compress-Archive -Path playwright-browsers -DestinationPath browsers.zip -Force"
          else
            zip -r browsers.zip playwright-browsers
          fi
          ls -la browsers.zip   # verifica se o arquivo foi criado

      - name: Build Executable with PyInstaller
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            SEP=";"
          else
            SEP=":"
          fi
          # Agora o destino é 'data/' (cria a pasta data e coloca o zip dentro)
          pyinstaller --onefile --copy-metadata playwright --add-data "browsers.zip${SEP}data/" finnet.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-executable
          path: dist/finnet*