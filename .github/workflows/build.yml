name: Build Multiplatform Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          pip install pyinstaller playwright
          export PLAYWRIGHT_BROWSERS_PATH=0
          playwright install chromium

      - name: Install Dependencies (Linux / Mac)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          # No Mac/Linux, instalamos normalmente sem forçar o embutimento local do browser
          pip install pyinstaller playwright

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller --onefile --noconsole --hidden-import=playwright finnet.py

      - name: Build with PyInstaller (Mac)
        if: matrix.os == 'macos-latest'
        # Usamos --exclude-module para impedir que o PyInstaller tente puxar o driver que quebra o codesign
        run: pyinstaller --onefile --hidden-import=playwright --exclude-module=playwright.driver finnet.py

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pyinstaller --onefile --hidden-import=playwright --exclude-module=playwright.driver finnet.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: finnet-${{ matrix.os }}
          path: dist/finnet*
