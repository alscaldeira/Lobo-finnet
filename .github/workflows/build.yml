name: Build Python Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      - name: Install PyInstaller and Dependencies
        run: |
          pip install pyinstaller
          pip install playwright
          # Instala também os navegadores no servidor Windows do GitHub
          playwright install chromium

      - name: Build with PyInstaller
        # O `--hidden-import` garante que o módulo playwright seja embutido no .exe
        run: pyinstaller --onefile --noconsole --hidden-import=playwright finnet.py

      - name: Upload Windows Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: finnet-windows-executable
          path: dist/finnet.exe
