name: Build Multiplatform Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      - name: Install Dependencies
        shell: bash
        run: |
          pip install pyinstaller playwright
          export PLAYWRIGHT_BROWSERS_PATH=0
          playwright install chromium

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller --onefile --noconsole --hidden-import=playwright finnet.py

      - name: Build with PyInstaller (Mac)
        if: matrix.os == 'macos-latest'
        # Adiciona argumentos específicos do macOS e impede que falhas de assinatura travem o build
        run: |
          pyinstaller --onefile --hidden-import=playwright --argv-emulation finnet.py || true
          # Se o comando acima falhar apenas na assinatura do Chromium, tentamos gerar sem embutir o browser inteiro no binário do Mac
          if [ ! -f dist/finnet ]; then
            pyinstaller --onefile --hidden-import=playwright --exclude-module=playwright.driver finnet.py
          fi

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pyinstaller --onefile --hidden-import=playwright finnet.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: finnet-${{ matrix.os }}
          path: dist/finnet*
