name: Build Multiplatform Executables (Embedded Browser)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      # Instala o Playwright de forma isolada e local em todos os sistemas operacionais
      - name: Install Dependencies and Browsers
        shell: bash
        run: |
          pip install pyinstaller playwright
          export PLAYWRIGHT_BROWSERS_PATH=0
          playwright install chromium

      # BUILD PARA WINDOWS (Navegador embutido)
      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Localiza onde o driver do Playwright foi salvo na pasta local do Python
          PLAYWRIGHT_DIR=$(python -c "import os, playwright; print(os.path.dirname(playwright.__file__))")
          pyinstaller --onefile --noconsole \
            --hidden-import=playwright \
            --add-data "$PLAYWRIGHT_DIR;playwright" \
            finnet.py

      # BUILD PARA MAC (Navegador embutido + Bypass de assinatura do Chromium)
      - name: Build with PyInstaller (Mac)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          PLAYWRIGHT_DIR=$(python -c "import os, playwright; print(os.path.dirname(playwright.__file__))")
          # O parâmetro '--codesign-identity=-' faz uma assinatura ad-hoc sem verificar assinaturas internas do Chromium
          pyinstaller --onefile \
            --hidden-import=playwright \
            --add-data "$PLAYWRIGHT_DIR:playwright" \
            --codesign-identity="-" \
            finnet.py

      # BUILD PARA LINUX (Navegador embutido)
      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          PLAYWRIGHT_DIR=$(python -c "import os, playwright; print(os.path.dirname(playwright.__file__))")
          # No Linux a separação do --add-data usa dois pontos (:)
          pyinstaller --onefile \
            --hidden-import=playwright \
            --add-data "$PLAYWRIGHT_DIR:playwright" \
            finnet.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: finnet-${{ matrix.os }}
          path: dist/finnet*
